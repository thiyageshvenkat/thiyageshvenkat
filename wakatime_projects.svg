<svg width="500" height="350" xmlns="http://www.w3.org/2000/svg">
    <style>
        .header { font: 600 18px 'Consolas', Ubuntu, sans-serif; fill: #58A6FF; filter: drop-shadow(0 0 1px rgba(88, 166, 255, 0.8)); }
        .stat-text { font: 400 14px Consolas, 'Courier New', monospace; fill: #C9D1D9; }
        .title-text { font: 600 14px Consolas, 'Courier New', monospace; fill: #8B949E; }
        .bar-bg { fill: #21262D; rx: 5px; }
        .bar-fg { fill: #58A6FF; rx: 5px; filter: drop-shadow(0 0 8px rgba(88, 166, 255, 0.8)); }
        /* Animation for a cool fade-in effect */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        g { animation: fadeIn 1s ease-in-out; }
    </style>
    
    <!-- Background rounded rectangle -->
    <rect width="500" height="350" fill="#0D1117" rx="10" stroke="#30363D" stroke-width="1"/>
    
    <!-- Header text -->
    <text x="25" y="35" class="header">📁 This Week's Projects</text>
    <text x="25" y="60" class="stat-text">🕛 Total Time: 1 hrs 57 mins</text>
    <text x="25" y="80" class="stat-text">🔥 Daily Average: 0 hrs 19 mins</text>
    
    <g transform="translate(25, 110)">
    
        <text x="0" y="12" class="title-text">DtParticipant_Portal</text>
        <text x="450" y="12" text-anchor="end" class="stat-text">0 hrs 52 mins (46.99%)</text>
        
        <!-- The background of the progress bar -->
        <rect x="0" y="20" width="450" height="10" class="bar-bg"/>
        <!-- The filled part of the progress bar -->
        <rect x="0" y="20" width="211.455" height="10" class="bar-fg"/>
        
        <text x="0" y="57" class="title-text">synopsys26</text>
        <text x="450" y="57" text-anchor="end" class="stat-text">0 hrs 38 mins (35.22%)</text>
        
        <!-- The background of the progress bar -->
        <rect x="0" y="65" width="450" height="10" class="bar-bg"/>
        <!-- The filled part of the progress bar -->
        <rect x="0" y="65" width="158.49" height="10" class="bar-fg"/>
        
        <text x="0" y="102" class="title-text">thiyagesh.dev</text>
        <text x="450" y="102" text-anchor="end" class="stat-text">0 hrs 17 mins (15.79%)</text>
        
        <!-- The background of the progress bar -->
        <rect x="0" y="110" width="450" height="10" class="bar-bg"/>
        <!-- The filled part of the progress bar -->
        <rect x="0" y="110" width="71.05499999999999" height="10" class="bar-fg"/>
        
        <text x="0" y="147" class="title-text">thiyageshvenkat</text>
        <text x="450" y="147" text-anchor="end" class="stat-text">0 hrs 2 mins (1.81%)</text>
        
        <!-- The background of the progress bar -->
        <rect x="0" y="155" width="450" height="10" class="bar-bg"/>
        <!-- The filled part of the progress bar -->
        <rect x="0" y="155" width="8.145000000000001" height="10" class="bar-fg"/>
        
        <text x="0" y="192" class="title-text">ven12</text>
        <text x="450" y="192" text-anchor="end" class="stat-text">0 hrs 0 mins (0.2%)</text>
        
        <!-- The background of the progress bar -->
        <rect x="0" y="200" width="450" height="10" class="bar-bg"/>
        <!-- The filled part of the progress bar -->
        <rect x="0" y="200" width="0.9" height="10" class="bar-fg"/>
        
    </g>
</svg>