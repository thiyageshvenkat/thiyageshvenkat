<svg width="500" height="350" xmlns="http://www.w3.org/2000/svg">
    <style>
        .header { font: 600 18px 'Consolas', Ubuntu, sans-serif; fill: #58A6FF; filter: drop-shadow(0 0 1px rgba(88, 166, 255, 0.8)); }
        .stat-text { font: 400 14px Consolas, 'Courier New', monospace; fill: #C9D1D9; }
        .title-text { font: 600 14px Consolas, 'Courier New', monospace; fill: #8B949E; }
        .bar-bg { fill: #21262D; rx: 5px; }
        .bar-fg { fill: #58A6FF; rx: 5px; filter: drop-shadow(0 0 8px rgba(88, 166, 255, 0.8)); }
        /* Animation for a cool fade-in effect */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        g { animation: fadeIn 1s ease-in-out; }
    </style>
    
    <!-- Background rounded rectangle -->
    <rect width="500" height="350" fill="#0D1117" rx="10" stroke="#30363D" stroke-width="1"/>
    
    <!-- Header text -->
    <text x="25" y="35" class="header">📊 This Week's Languages</text>
    <text x="25" y="60" class="stat-text">🕛 Total Time: 5 hrs 30 mins</text>
    <text x="25" y="80" class="stat-text">🔥 Daily Average: 0 hrs 47 mins</text>
    
    <g transform="translate(25, 110)">
    
        <text x="0" y="12" class="title-text">unknown</text>
        <text x="450" y="12" text-anchor="end" class="stat-text">3 hrs 1 mins (41.56%)</text>
        
        <!-- The background of the progress bar -->
        <rect x="0" y="20" width="450" height="10" class="bar-bg"/>
        <!-- The filled part of the progress bar -->
        <rect x="0" y="20" width="187.02" height="10" class="bar-fg"/>
        
        <text x="0" y="57" class="title-text">Python</text>
        <text x="450" y="57" text-anchor="end" class="stat-text">1 hrs 19 mins (18.11%)</text>
        
        <!-- The background of the progress bar -->
        <rect x="0" y="65" width="450" height="10" class="bar-bg"/>
        <!-- The filled part of the progress bar -->
        <rect x="0" y="65" width="81.49499999999999" height="10" class="bar-fg"/>
        
        <text x="0" y="102" class="title-text">Nextflow</text>
        <text x="450" y="102" text-anchor="end" class="stat-text">0 hrs 56 mins (12.95%)</text>
        
        <!-- The background of the progress bar -->
        <rect x="0" y="110" width="450" height="10" class="bar-bg"/>
        <!-- The filled part of the progress bar -->
        <rect x="0" y="110" width="58.275" height="10" class="bar-fg"/>
        
        <text x="0" y="147" class="title-text">TypeScript</text>
        <text x="450" y="147" text-anchor="end" class="stat-text">0 hrs 46 mins (10.61%)</text>
        
        <!-- The background of the progress bar -->
        <rect x="0" y="155" width="450" height="10" class="bar-bg"/>
        <!-- The filled part of the progress bar -->
        <rect x="0" y="155" width="47.745" height="10" class="bar-fg"/>
        
        <text x="0" y="192" class="title-text">Markdown</text>
        <text x="450" y="192" text-anchor="end" class="stat-text">0 hrs 36 mins (8.44%)</text>
        
        <!-- The background of the progress bar -->
        <rect x="0" y="200" width="450" height="10" class="bar-bg"/>
        <!-- The filled part of the progress bar -->
        <rect x="0" y="200" width="37.98" height="10" class="bar-fg"/>
        
    </g>
</svg>